<!--
  FCTG /jobs page — Webflow loader for jobs-filter.js + field-label-cap.js
  ─────────────────────────────────────────────────────
  Page:  /jobs (and /jobs/{slug} for back-button wiring + label caps)
  Where: Page Settings → Custom Code → Inside <body> tag
  Size:  ~1.2 KB

  This is the ONLY thing pasted into Webflow for the /jobs page. The
  scripts it loads live at the repo root and are served via jsDelivr:
    - jobs-filter.js     the faceted filter engine (full on /jobs;
                         only the back-button wiring on /jobs/{slug})
    - field-label-cap.js the "+N more" truncation for location/region/
                         work-type label lists (both pages)

  WHY SHA-PINNING (May 2026): we previously used a `?b=N&v=<epoch>`
  cache-busted URL pointing at @main. jsDelivr's branch-name URL cached
  a stale SHA reference and the public purge endpoint couldn't reliably
  invalidate it (purge ACKs returned status:"finished" but edges kept
  serving stale content for 12+ hours). SHA-pinned URLs (cdn.jsdelivr.net
  /gh/owner/repo@<sha>/file.js) are immutable — jsDelivr always serves
  them correctly. This loader resolves the latest commit on main via the
  GitHub API (cached 10 min in localStorage to limit API calls), then
  pins jsDelivr to that SHA.

  GitHub API rate limit: 60 requests/hour per unauthenticated IP. With
  10-min localStorage caching, each visitor makes at most 6 API calls
  per hour. Plenty of headroom for a careers site.

  Fallback: if the GitHub API is unreachable, falls back to the @main
  branch URL with a static cache-bust marker. Will serve whatever
  jsDelivr currently has cached for that branch — better than nothing.

  Paste this on BOTH:
    - /jobs (listing page) — runs the full filter engine
    - /jobs/{slug} (template page) — runs only setupBackButton()
-->
<script>
(function () {
  var REPO = 'The-Uncoders/pageup-webflow-sync';
  var FILES = ['jobs-filter.js', 'field-label-cap.js'];
  var CACHE_KEY = 'fctg_jf_sha';
  var CACHE_TTL = 10 * 60 * 1000;
  var FALLBACK_REF = '@main';
  var FALLBACK_SUFFIX = '?b=4';

  function injectAll(ref, suffix) {
    FILES.forEach(function (file) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/gh/' + REPO + ref + '/' + file + (suffix || '');
      s.defer = true;
      document.body.appendChild(s);
    });
  }

  try {
    var c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (c && c.sha && c.ts && (Date.now() - c.ts < CACHE_TTL)) {
      injectAll('@' + c.sha);
      return;
    }
  } catch (e) {}

  fetch('https://api.github.com/repos/' + REPO + '/commits/main')
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (!d.sha) throw new Error('no sha');
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ sha: d.sha, ts: Date.now() })); } catch (e) {}
      injectAll('@' + d.sha);
    })
    .catch(function () { injectAll(FALLBACK_REF, FALLBACK_SUFFIX); });
})();
</script>
