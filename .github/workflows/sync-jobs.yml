name: Sync PageUp Jobs to Webflow

on:
  schedule:
    # Run every 20 minutes. Fast-sync makes no-op runs finish in under a
    # minute, so the cadence is safe.
    - cron: '*/20 * * * *'
  workflow_dispatch: # Allow manual trigger (used by dashboard "Run Sync Now")

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run job sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_BRAND_COLLECTION_ID: ${{ secrets.WEBFLOW_BRAND_COLLECTION_ID }}
          WEBFLOW_COUNTRY_COLLECTION_ID: ${{ secrets.WEBFLOW_COUNTRY_COLLECTION_ID }}
        run: npm run sync

      - name: Publish artifacts to data branch
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # JSON artifacts live on a dedicated `data` branch so main's history
          # stays clean. The data branch is amended in-place every run rather
          # than growing with one commit per sync.
          git fetch origin data
          git worktree add /tmp/data-branch origin/data

          # Copy freshly generated artifacts from the main working tree
          cp "$GITHUB_WORKSPACE/all-jobs.json"      /tmp/data-branch/all-jobs.json
          cp "$GITHUB_WORKSPACE/filter-counts.json" /tmp/data-branch/filter-counts.json
          if [ -f "$GITHUB_WORKSPACE/data/sync-log.json" ]; then
            cp "$GITHUB_WORKSPACE/data/sync-log.json" /tmp/data-branch/sync-log.json
          fi

          cd /tmp/data-branch
          git add -A
          if git diff --staged --quiet; then
            echo "No artifact changes — skipping commit."
            exit 0
          fi

          # Amend the previous CI commit so the data branch stays a single
          # moving commit; fall back to a fresh commit if the last commit
          # wasn't by the bot.
          if [ "$(git log -1 --pretty=%an 2>/dev/null)" = "github-actions[bot]" ]; then
            git commit --amend --no-edit
            git push --force-with-lease origin HEAD:data
          else
            git commit -m "chore: regenerate job data"
            git push origin HEAD:data
          fi

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/all-jobs.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/filter-counts.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/sync-log.json" || true
