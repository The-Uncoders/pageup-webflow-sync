name: Sync PageUp Jobs to Webflow

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run job sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_BRAND_COLLECTION_ID: ${{ secrets.WEBFLOW_BRAND_COLLECTION_ID }}
          WEBFLOW_COUNTRY_COLLECTION_ID: ${{ secrets.WEBFLOW_COUNTRY_COLLECTION_ID }}
        run: npm run sync

      - name: Commit updated JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all-jobs.json filter-counts.json total-jobs.json
          git add -f data/sync-log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: regenerate job data from CMS sync"

      - name: Push changes
        run: git diff HEAD~1 --quiet || git push

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@main/all-jobs.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@main/filter-counts.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@main/total-jobs.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@main/data/sync-log.json" || true
