name: Sync PageUp Jobs to Webflow

on:
  # Scheduling is driven by the `fctg-sync-trigger` Cloudflare Worker's Cron
  # Triggers (every 10 min fast-sync + daily 02:00 UTC force-full), which
  # workflow_dispatch into this workflow. GitHub Actions' own `schedule:` crons
  # were removed: GitHub runs scheduled workflows best-effort and drops most of
  # them under load (observed ~10 runs/day against a 20-min target, gaps up to
  # 5 hours) — that lag is what made new jobs take up to 3 hours to appear.
  # Cloudflare cron fires on time. See worker/wrangler.jsonc + worker/sync-trigger.js.
  workflow_dispatch:
    # Manual trigger from dashboard "Run Sync Now". The `force_full` input
    # lets the dashboard's "Force Full Rescrape" button bypass the
    # listing-level diff on demand. The `job_id` input switches the run
    # into single-job mode — only that one PageUp job is reconciled.
    inputs:
      force_full:
        description: 'Re-scrape every existing job (bypass listing-level fast-diff)'
        type: boolean
        default: false
      job_id:
        description: 'Single-job mode: reconcile only this PageUp job ID (leave empty for normal run)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

# At a 10-min cadence a run can still be in flight when the next fires (or the
# daily force-full overlaps a fast-sync). Serialize the routine runs so they
# don't race on the data-branch force-push. Queue rather than cancel — a
# mid-write run must finish. Single-job dispatches get their own per-job group
# so a recruiter's "force re-sync this job" never waits behind (or is dropped
# by) the main cadence.
concurrency:
  group: sync-jobs-${{ github.event.inputs.job_id || 'main' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Retried because `--with-deps` runs apt against the runner image's
        # package mirrors, which fail transiently (2026-07-07: three runs died
        # on packages.microsoft.com serving invalid InRelease data). Retries
        # absorb blips; a mirror outage longer than ~2 min is covered by the
        # next 10-min tick.
        run: |
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "Playwright install failed (attempt ${attempt} of 3)."
            [ "$attempt" -lt 3 ] && sleep $((attempt * 20))
          done
          echo "::error::Playwright install failed after 3 attempts."
          exit 1

      - name: Seed local sync-log + sync-hashes from data branch
        # The main branch doesn't track data/sync-log.json or
        # data/sync-hashes.json — those live on the `data` branch. Fetch
        # the current copies so the sync appends to real history and the
        # hash map reflects what we stored after the previous run.
        run: |
          mkdir -p data
          curl -sfL \
            "https://raw.githubusercontent.com/The-Uncoders/pageup-webflow-sync/data/sync-log.json" \
            -o data/sync-log.json \
            || echo '[]' > data/sync-log.json
          curl -sfL \
            "https://raw.githubusercontent.com/The-Uncoders/pageup-webflow-sync/data/sync-hashes.json" \
            -o data/sync-hashes.json \
            || echo '{}' > data/sync-hashes.json

      - name: Run job sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: ${{ secrets.WEBFLOW_SITE_ID }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          WEBFLOW_BRAND_COLLECTION_ID: ${{ secrets.WEBFLOW_BRAND_COLLECTION_ID }}
          WEBFLOW_COUNTRY_COLLECTION_ID: ${{ secrets.WEBFLOW_COUNTRY_COLLECTION_ID }}
          # Force-full mode: true when triggered by the daily 02:00 UTC cron
          # OR when the dashboard sets the workflow_dispatch input to true.
          SYNC_FORCE_FULL: ${{ github.event.schedule == '0 2 * * *' || github.event.inputs.force_full == 'true' }}
          # Single-job mode: when set to a PageUp job ID, sync only that one
          # job. Empty for crons and "Run Sync Now" → normal full pipeline.
          SYNC_JOB_ID: ${{ github.event.inputs.job_id || '' }}
        run: npm run sync

      - name: Publish artifacts to data branch
        if: success()
        # Retried because the push can be rejected by transient GitHub-side
        # errors (2026-07-07: `remote: fatal error in commit_refs`). Each
        # attempt rebuilds the worktree from a fresh fetch so the amend +
        # force-with-lease always applies against the current remote state.
        # The attempt body runs as its own script (fresh `bash` invocation)
        # so its `set -e` isn't neutered by running in an `if` context.
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cat > /tmp/publish-data.sh <<'EOF'
          set -euo pipefail

          # JSON artifacts live on a dedicated `data` branch so main's history
          # stays clean. The data branch is amended in-place every run rather
          # than growing with one commit per sync.
          git fetch origin data
          git worktree remove --force /tmp/data-branch 2>/dev/null || true
          git worktree prune || true
          git worktree add /tmp/data-branch origin/data

          # Copy freshly generated artifacts from the main working tree.
          # all-jobs.json and filter-counts.json are only regenerated when
          # the sync produced changes — single-job mode that hashes to a
          # no-op doesn't write them. Guard the copies so a clean no-op
          # run still publishes the updated sync-log + sync-hashes.
          if [ -f "$GITHUB_WORKSPACE/all-jobs.json" ]; then
            cp "$GITHUB_WORKSPACE/all-jobs.json" /tmp/data-branch/all-jobs.json
          fi
          if [ -f "$GITHUB_WORKSPACE/filter-counts.json" ]; then
            cp "$GITHUB_WORKSPACE/filter-counts.json" /tmp/data-branch/filter-counts.json
          fi
          if [ -f "$GITHUB_WORKSPACE/data/sync-log.json" ]; then
            cp "$GITHUB_WORKSPACE/data/sync-log.json" /tmp/data-branch/sync-log.json
          fi
          if [ -f "$GITHUB_WORKSPACE/data/sync-hashes.json" ]; then
            cp "$GITHUB_WORKSPACE/data/sync-hashes.json" /tmp/data-branch/sync-hashes.json
          fi

          cd /tmp/data-branch
          git add -A
          if git diff --staged --quiet; then
            echo "No artifact changes — skipping commit."
            exit 0
          fi

          # Amend the previous CI commit so the data branch stays a single
          # moving commit; fall back to a fresh commit if the last commit
          # wasn't by the bot.
          if [ "$(git log -1 --pretty=%an 2>/dev/null)" = "github-actions[bot]" ]; then
            git commit --amend --no-edit
            git push --force-with-lease origin HEAD:data
          else
            git commit -m "chore: regenerate job data"
            git push origin HEAD:data
          fi
          EOF

          for attempt in 1 2 3; do
            if bash /tmp/publish-data.sh; then
              exit 0
            fi
            echo "Publish attempt ${attempt} of 3 failed."
            [ "$attempt" -lt 3 ] && sleep $((attempt * 15))
          done
          echo "::error::Publishing artifacts to the data branch failed after 3 attempts."
          exit 1

      - name: Purge jsDelivr CDN cache
        if: success()
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/all-jobs.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/filter-counts.json" || true
          curl -sf "https://purge.jsdelivr.net/gh/The-Uncoders/pageup-webflow-sync@data/sync-log.json" || true
